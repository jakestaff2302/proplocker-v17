    // ---------- Crypto Helpers ----------
    async function hashString(str) {
      const msgBuffer = new TextEncoder().encode(str);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const generateLoginId = () => "PL-" + Math.random().toString(36).substring(2, 8).toUpperCase();

    // ---------- Netlify Backend Helpers ----------
    const NETLIFY_FN_BASE = "/.netlify/functions";

    async function postJSON(path, body) {
      const res = await fetch(`${NETLIFY_FN_BASE}${path}`, {
        method: "POST",
        headers: {
  "Content-Type": "application/json",
  ...(localStorage.getItem("prop_locker_token")
    ? { Authorization: `Bearer ${localStorage.getItem("prop_locker_token")}`
 }
    : {})
},

        body: JSON.stringify(body),
      });
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
      if (!res.ok) {
        const msg = data?.error || data?.message || `Request failed (${res.status})`;
        throw new Error(msg);
      }
      return data;
    }

    async function getJSON(path) {
  const token = localStorage.getItem("prop_locker_token");

  const res = await fetch(`${NETLIFY_FN_BASE}${path}`, {
    method: "GET",
    headers: {
      ...(token ? {Authorization: `Bearer ${token}` } : {})
    }
  });

  const text = await res.text();
  let data;
  try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }

  if (!res.ok) {
    const msg = data?.error || data?.message || `Request failed (${res.status})`;
    throw new Error(msg);
  }
  return data;
}

    async function requestAuthToken(identity) {
      if (!identity) return null;
      try {
        const tokenResult = await postJSON("/auth-token", {
          loginId: identity.loginId || identity.login_id || "",
          email: identity.email || ""
        });
        const token = typeof tokenResult?.token === "string" ? tokenResult.token : "";
        if (!token) return null;

        localStorage.setItem("prop_locker_token", token);
        console.debug("[auth-token] tokenParts", token.split(".").length);
        return token;
      } catch (err) {
        console.warn("Cloud token issuance failed:", err?.message);
        return null;
      }
    }

        await postJSON("/send-login-email", {

          loginId: details.loginId,
          name: details.name || "",
          link: details.link || "https://proplocker.app/login",
        });
        return { ...details, sentVia: "backend" };

        console.warn("Email backend unavailable, using preview fallback:", err?.message);

    function calculateDecision(account){
      const rules = account.rules || {};
      const totalProfit = account.currentBalance - account.startBalance;
      const baseProfitTarget = account.profitGoal !== undefined ? account.profitGoal : (rules.payoutThresholdProfit || 3000);
      const winningDays = account.winningDays || 0;

      const maxDayProfit = (account.dailyLogs || []).reduce((m, l) => Math.max(m, l.pnl > 0 ? l.pnl : 0), 0);

      // Handle 0% consistency correctly (0 = disabled)
      const rawConsistency = rules.consistencyRule !== undefined ? rules.consistencyRule : 50;
      let isConsistencyBreached = false;
      let adjustedTarget = baseProfitTarget;

      if (rawConsistency > 0) {
        const consistencyThreshold = rawConsistency / 100;
        const baseAllowance = baseProfitTarget * consistencyThreshold;

        isConsistencyBreached = maxDayProfit > baseAllowance;
        adjustedTarget = isConsistencyBreached
          ? Math.max(baseProfitTarget, maxDayProfit / consistencyThreshold)
          : baseProfitTarget;
      }

      const isProfitMet = totalProfit >= adjustedTarget;
      const ddLimit = rules.drawdownLimit || 2000;
      const ddLine = account.drawdownFloor ?? (account.startBalance - ddLimit);
      const distanceToBreach = account.currentBalance - ddLine;

      let status = "ACTIVE";
      let color = "emerald";

      if (distanceToBreach <= 0) {
        status = "BREACHED"; color = "red";
      } else if (isProfitMet) {
        if (winningDays < (rules.minWinningDays || 5)) { status = "DAYS PENDING"; color = "zinc"; }
        else {
          status = account.phase === 'evaluation' ? "ACCOUNT PASSED" : "PAYOUT READY";
          color = "emerald";
        }
      } else {
        status = totalProfit < 0 ? "DRAWDOWN" : "ACTIVE";
        color = totalProfit < 0 ? "red" : "emerald";
      }

      return {
        status, color, distanceToBreach, profit: totalProfit,
        canPayout: status === "PAYOUT READY" || status === "ACCOUNT PASSED",
        thresholdAmount: adjustedTarget,
        progress: Math.min(100, (totalProfit / adjustedTarget) * 100),
        winGoalMet: winningDays >= (rules.minWinningDays || 5),
        profitGoalMet: isProfitMet,
        ddLine,
        isConsistencyBreached,
        maxDayProfit
      };
    }

            loginId: loginId

          await requestAuthToken(created);

              hasActiveSubscription: false

    const LoginPage = ({ onLogin, onNavigateToSignup }) => {
      const [identifier, setIdentifier] = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError("");

        const inputHash = await hashString(password);

        let backendMode = null;

        try {
          const result = await postJSON("/user-data", {
            identifier,
            passwordHash: inputHash,
          });

          if (result?.user) {
            backendMode = "cloud";
            if (typeof result?.token === "string") {
              localStorage.setItem("prop_locker_token", result.token);
              console.debug("[auth-token] tokenParts", result.token.split(".").length);
            } else {
              await requestAuthToken(result.user);
            }
            onLogin(result.user, backendMode);
            setLoading(false);
            return;
          }

          if (result?.mode === "local") {
            backendMode = "local";
            console.info("Login backend in local mode, using local credential fallback.");
          }
        } catch (err) {
          console.warn("Backend login failed, falling back to localStorage:", err?.message);
        }

        setTimeout(async () => {
          const users = JSON.parse(localStorage.getItem('prop_locker_users_v1') || '[]');

          const user = users.find(u =>
            (u.email.toLowerCase() === identifier.toLowerCase() || u.loginId === identifier) &&
            u.passwordHash === inputHash
          );

          if (user) {
            await requestAuthToken(user);
            const token = localStorage.getItem("prop_locker_token");
            const hasJwt = Boolean(
              token &&
              /^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(token)
            );
            onLogin(user, hasJwt ? "cloud" : (backendMode || "local"));
          } else {
            setError("Invalid credentials. Please check your Email/ID and Password.");
          }
          setLoading(false);
        }, 800);
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center px-4 animate-enter">

              </div>
              <div>
                <input type="password" className="w-full bg-black/40 border-b border-zinc-800 px-4 py-2 text-white text-sm focus:border-glow-green outline-none" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} />
              </div>
              <button type="submit" disabled={loading} className="w-full bg-glow-green hover:bg-white text-black font-bold py-4 rounded-xl transition-all mt-4 flex items-center justify-center gap-2 uppercase tracking-widest">
                {loading ? <span className="animate-spin rounded-full h-4 w-4 border-b-2 border-black"></span> : "Establish Connection"}

    /* ===========================

       =========================== */
    const AccountCard = ({ account, onDelete, onUpdate, onEdit, onDuplicate, setPhaseTab, isSelected, onToggleSelection, lockers }) => {
      const rules = account.rules || {};
      const decision = calculateDecision(account);
      const [logPnl, setLogPnl] = useState("");
      const [isEditingBalance, setIsEditingBalance] = useState(false);
      const [editBal, setEditBal] = useState(account.currentBalance);

      const [showPayoutForm, setShowPayoutForm] = useState(false);
      const [showUpgradeForm, setShowUpgradeForm] = useState(false);
      const [payoutAmt, setPayoutAmt] = useState("");
      const [newMinBal, setNewMinBal] = useState("");
      const [activationFee, setActivationFee] = useState("");
      const [newMinWins, setNewMinWins] = useState(rules.minWinningDays || 5);
      const [newMinWinReq, setNewMinWinReq] = useState(rules.minWinReq || 100);
      const [newProfitTarget, setNewProfitTarget] = useState(account.profitGoal || 3000);
      const [newConsistencyRule, setNewConsistencyRule] = useState(rules.consistencyRule || 20);
      const [destinationLockerId, setDestinationLockerId] = useState("");

      const fundedLockers = useMemo(() => lockers, [lockers]);

      useEffect(() => {
        if (fundedLockers.length > 0 && !destinationLockerId) {
          setDestinationLockerId(fundedLockers[0].id);
        }
      }, [fundedLockers]);

      const handleSaveBalance = () => {
        const next = Number(editBal);
        const maxEquity = Math.max(account.maxEquity || next, next);
        onUpdate(account.id, { ...account, currentBalance: next, maxEquity });
        setIsEditingBalance(false);
      };

      const handleAddLog = () => {
        if(!logPnl) return;
        const pnl = Number(logPnl);
        const nextBal = account.currentBalance + pnl;
        const qualifiesAsWin = pnl >= (rules.minWinReq || 100);
        onUpdate(account.id, {
          ...account,
          currentBalance: nextBal,
          maxEquity: Math.max(account.maxEquity || nextBal, nextBal),
          dailyLogs: [{ date: yyyyMmDd(), pnl }, ...(account.dailyLogs||[])],
          winningDays: (account.winningDays||0) + (qualifiesAsWin ? 1 : 0)
        });
        setLogPnl(""); setEditBal(nextBal);
      };

      const handleUpgradeSubmit = () => {
        if (!destinationLockerId) return;
        onUpdate(account.id, {
          ...account, phase: "funded", currentBalance: account.startBalance, winningDays: 0, dailyLogs: [], cost: account.cost + (Number(activationFee) || 0),
          lockerId: Number(destinationLockerId),
          rules: {
            ...account.rules,
            minWinningDays: newMinWins,
            minWinReq: newMinWinReq,
            payoutThresholdProfit: newProfitTarget,
            consistencyRule: newConsistencyRule
          },
          profitGoal: newProfitTarget
        });
        setShowUpgradeForm(false);
        if(setPhaseTab) setPhaseTab("funded");
      };

      const handlePayoutSubmit = () => {
        if(!payoutAmt) return;
        const amt = Number(payoutAmt);
        const nextBal = account.currentBalance - amt;
        onUpdate(account.id, {
          ...account,
          currentBalance: nextBal,
          activity: [...(account.activity || []), { type: "payout", amount: amt, ts: nowISO() }],
          winningDays: 0,
          drawdownFloor: newMinBal ? Number(newMinBal) : account.drawdownFloor
        });
        setShowPayoutForm(false); setPayoutAmt(""); setNewMinBal(""); setEditBal(nextBal);
      };

      return (
        <div className={`secure-module p-6 animate-fade-in border-zinc-800 ${isSelected ? 'ring-2 ring-[#6DFFC6]' : ''}`}>
          <div className="relative z-10 flex flex-col h-full justify-between">
            <div className="flex justify-between items-start mb-4">
              <div className="flex gap-3 items-center">
                <div className={`account-checkbox ${isSelected ? 'checked' : ''}`} onClick={() => onToggleSelection(account.id)}>
                  {isSelected && <Check size={12} strokeWidth={4} />}
                </div>
                <div>
                  <h3 className="text-white font-bold font-logo text-sm tracking-[0.1em] uppercase leading-none">{account.name}</h3>
                  <div className="text-[9px] text-zinc-500 font-bold uppercase tracking-[0.2em] mt-1">{account.firm} // <span className={decision.color === "red" ? "text-red-500" : "text-glow-green"}>{decision.status}</span></div>
                </div>
              </div>
              <div className="flex gap-2">
                <button onClick={() => onEdit(account)} className="p-1.5 bg-zinc-800/80 rounded hover:text-glow-green transition-colors"><Edit2 size={14}/></button>
                <button onClick={() => onDuplicate(account)} className="p-1.5 bg-zinc-800/80 rounded hover:text-blue-400 transition-colors"><Copy size={14}/></button>
                <button onClick={() => onDelete(account.id)} className="p-1.5 bg-zinc-800/80 rounded hover:text-red-500 transition-colors"><Trash2 size={14}/></button>
              </div>
            </div>

            <div className="text-center mb-2">
              <div className="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.1em] mb-1">Current Balance</div>
              {isEditingBalance ? (
                <div className="flex items-center justify-center gap-2">
                  <input type="number" value={editBal} onChange={(e)=>setEditBal(e.target.value)} className="bg-black/50 text-white font-data text-3xl w-40 text-center border-b border-glow-green outline-none" autoFocus />
                  <button onClick={handleSaveBalance} className="text-glow-green"><Save size={18}/></button>
                </div>
              ) : (
                <div onClick={()=>setIsEditingBalance(true)} className={`text-4xl font-extrabold font-data cursor-pointer transition-colors select-none mb-1 leading-none tracking-tight ${decision.status === 'BREACHED' ? 'text-red-500' : 'text-white hover:text-glow-green'}`}>{fmt0(account.currentBalance)}</div>
              )}
              <div className={`text-sm font-bold font-data ${decision.profit >= 0 ? "text-glow-green" : "text-red-500"}`}>{decision.profit >= 0 ? "+" : ""}{fmt0(decision.profit)}</div>
            </div>

            <div className="space-y-3 mb-4">
              <div>
                <div className="flex justify-between items-center mb-1">
                  <div className="flex items-center gap-1.5">
                    <span className="text-[8px] text-zinc-500 font-bold uppercase tracking-[0.15em]">Profit Goal</span>
                    {decision.profit > 0 && decision.isConsistencyBreached && <span className="text-[7px] bg-red-500/20 text-red-400 px-1 rounded font-bold uppercase">Adj.</span>}
                  </div>
                  <span className="text-[8px] text-zinc-400 font-data tracking-widest">{fmt0(Math.max(0, decision.profit))} / {fmt0(decision.thresholdAmount)}</span>
                </div>
                <div className="h-1 w-full bg-white/10 rounded-full overflow-hidden">
                  <div className={`h-full transition-all duration-1000 ${decision.isConsistencyBreached ? 'bg-orange-400' : 'bg-glow-green'}`} style={{width: `${decision.progress}%`}}></div>
                </div>
              </div>

              <div>
                <div className="flex justify-between items-center mb-1">
                  <span className="text-[8px] text-red-500/80 font-bold uppercase tracking-[0.15em]">Drawdown</span>
                  <span className="text-[8px] text-zinc-400 font-data tracking-widest">Floor: {fmt0(decision.ddLine)}</span>
                </div>
                <div className="h-1 w-full bg-white/10 rounded-full overflow-hidden">
                  <div className={`h-full transition-all duration-1000 ${decision.status === 'BREACHED' ? 'bg-red-600' : 'bg-red-500'}`} style={{width: `${Math.max(0, Math.min(100, (1 - (account.currentBalance - decision.ddLine) / (rules.drawdownLimit || 2000)) * 100))}%`}}></div>
                </div>
              </div>

              <div>
                <div className="flex justify-between items-center mb-1">
                  <span className="text-[8px] text-zinc-500 font-bold uppercase tracking-[0.15em]">Winning Days (Min ${fmt0(rules.minWinReq || 100)})</span>
                  <span className="text-[8px] text-zinc-400 font-data tracking-widest">{account.winningDays || 0} / {rules.minWinningDays || 5}</span>
                </div>
                <div className="flex gap-1 h-1">
                  {Array.from({length: (rules.minWinningDays || 5)}).map((_, i) => (
                    <div key={i} className={`flex-1 rounded-full transition-all duration-500 ${i < (account.winningDays||0) ? 'bg-glow-green shadow-[0_0_8px_rgba(109,255,198,0.5)]' : 'bg-white/10'}`}></div>
                  ))}
                </div>
              </div>
            </div>

            <div className="flex gap-2">
              <div className="flex-1">
                {decision.canPayout && !showUpgradeForm && !showPayoutForm ? (
                  account.phase === 'evaluation' ? (
                    <button onClick={() => setShowUpgradeForm(true)} className="w-full bg-glow-green/20 border border-glow-green text-glow-green font-bold text-[9px] py-2 rounded hover:bg-glow-green hover:text-black transition-all uppercase tracking-widest">Move To Funded</button>
                  ) : (
                    <button onClick={() => setShowPayoutForm(true)} className="w-full bg-glow-green/20 border border-glow-green text-glow-green font-bold text-[9px] py-2 rounded hover:bg-glow-green hover:text-black transition-all uppercase tracking-widest">Payout</button>
                  )
                ) : (
                  <div className="flex gap-1">
                    <input type="text" placeholder="+/-" value={logPnl} onChange={e=>setLogPnl(e.target.value)} className="bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-[10px] text-white font-data flex-1 outline-none focus:border-glow-green"/>
                    <button onClick={handleAddLog} className="bg-zinc-800 hover:bg-white hover:text-black text-zinc-400 px-3 rounded text-[9px] font-black uppercase tracking-widest transition-all">LOG</button>
                  </div>
                )}
              </div>
            </div>

            {(showUpgradeForm || showPayoutForm) && (
              <div className="absolute inset-0 bg-[#09090b] z-20 flex flex-col justify-center p-4 animate-fade-in">
                {showUpgradeForm && (
                  <div className="space-y-3">
                    <div className="flex justify-between border-b border-zinc-800 pb-2"><span className="text-xs font-bold text-white uppercase">Funded Setup</span><button onClick={()=>setShowUpgradeForm(false)}><XIcon size={14} className="text-zinc-500"/></button></div>
                    <select className="w-full bg-zinc-900 border border-zinc-800 rounded p-2 text-[10px] text-white font-bold" value={destinationLockerId} onChange={e=>setDestinationLockerId(e.target.value)}>
                      <option value="">Select Destination Locker...</option>
                      {fundedLockers.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
                    </select>
                    <input type="number" placeholder="Fee ($)" className="w-full bg-zinc-900 border border-zinc-800 rounded p-2 text-[10px] text-white" value={activationFee} onChange={e=>setActivationFee(e.target.value)} />
                    <div className="grid grid-cols-2 gap-2">
                      <input type="number" className="bg-zinc-900 border border-zinc-800 rounded p-2 text-[10px] text-white" value={newMinWins} onChange={e=>setNewMinWins(e.target.value)} title="Min Wins"/>
                      <input type="number" className="bg-zinc-900 border border-zinc-800 rounded p-2 text-[10px] text-white" value={newMinWinReq} onChange={e=>setNewMinWinReq(e.target.value)} title="Min Win $"/>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div className="space-y-1"><label className="text-[9px] text-zinc-500 uppercase font-bold">Payout Target ($)</label><input type="number" className="w-full bg-zinc-900 border border-zinc-800 rounded p-2 text-xs text-white outline-none focus:border-glow-green font-bold" value={newProfitTarget} onChange={e=>setNewProfitTarget(Number(e.target.value))} /></div>
                      <div className="space-y-1">
                        <label className="text-[9px] text-zinc-500 uppercase font-bold block mb-1">Consistency (%)</label>
                        <div className="flex items-center gap-2">
                          <button className="stepper-btn" onClick={() => setNewConsistencyRule(Math.max(0, newConsistencyRule - 5))}><Minus size={12} className="text-glow-green"/></button>
                          <span className="font-data text-white font-bold text-xs">{newConsistencyRule}%</span>
                          <button className="stepper-btn" onClick={() => setNewConsistencyRule(Math.min(100, newConsistencyRule + 5))}><Plus size={12} className="text-glow-green"/></button>
                        </div>
                      </div>
                    </div>
                    <button onClick={handleUpgradeSubmit} disabled={!destinationLockerId} className="w-full bg-glow-green text-black font-bold text-[10px] py-2 rounded uppercase">Confirm</button>
                  </div>
                )}

                {showPayoutForm && (
                  <div className="space-y-3">
                    <div className="flex justify-between border-b border-zinc-800 pb-2"><span className="text-xs font-bold text-white uppercase">Withdrawal</span><button onClick={()=>setShowPayoutForm(false)}><XIcon size={14} className="text-zinc-500"/></button></div>
                    <input type="number" placeholder="Amount ($)" className="w-full bg-zinc-900 border border-zinc-800 rounded p-2 text-[10px] text-white" value={payoutAmt} onChange={e=>setPayoutAmt(e.target.value)} />
                    <input type="number" placeholder="New Floor ($)" className="w-full bg-zinc-900 border border-zinc-800 rounded p-2 text-[10px] text-white" value={newMinBal} onChange={e=>setNewMinBal(e.target.value)} />
                    <button onClick={handlePayoutSubmit} className="w-full bg-glow-green text-black font-bold text-[10px] py-2 rounded uppercase">Confirm</button>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    };

    /* ===========================
       ========== MAIN SUITE
       =========================== */
    const LockerSuite = ({ onLogout, onSessionExpired, backendMode }) => {
      const [activeTab, setActiveTab] = useState("locker");
      const [phaseTab, setPhaseTab] = useState("evaluation");
      const [currentLockerId, setCurrentLockerId] = useState(null);
      const [pnlTimeframe, setPnlTimeframe] = useState("ALL");

      const [folders, setFolders] = useState(() => { try { return JSON.parse(localStorage.getItem(LOCKER_STORAGE_KEY)) || []; } catch { return []; } });
      const [accounts, setAccounts] = useState(() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } });

      const [selectedAccountIds, setSelectedAccountIds] = useState([]);
      const [bulkPnl, setBulkPnl] = useState("");

      const [isAccountModalOpen, setIsAccountModalOpen] = useState(false);
      const [isLockerModalOpen, setIsLockerModalOpen] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const [editingAccount, setEditingAccount] = useState(null);
      const [editingLocker, setEditingLocker] = useState(null);

      // Freemium State
      const [isPro, setIsPro] = useState(false);

      const menuRef = useRef(null);

      // Tools State
      const [calcProfit, setCalcProfit] = useState(3000);
      const [calcCons, setCalcCons] = useState(40);
      const [riskRisk, setRiskRisk] = useState(500);
      const [riskStop, setRiskStop] = useState(20);

      useEffect(() => {
        (async () => {
          try {
            const ent = await getJSON("/get-entitlement");
            setIsPro(!!ent?.hasActiveSubscription);
          } catch {
            setIsPro(false);
          }

          if (localStorage.getItem('prop_locker_token')) {
            try {
              const data = await getJSON("/app-sync");
              if (data) {
                setFolders(data.lockers_json || []);
                setAccounts(data.accounts_json || []);
              }
            } catch (e) { console.error("Data load failed", e); }
          }
        })();
      }, []);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
        localStorage.setItem(LOCKER_STORAGE_KEY, JSON.stringify(folders));

        if (localStorage.getItem('prop_locker_token')) {
          const handler = setTimeout(() => {
            postJSON("/app-sync", { lockers: folders, accounts: accounts }).catch(e => console.error("Sync fail", e));
          }, 1000);
          return () => clearTimeout(handler);
        }
      }, [accounts, folders]);

      const handleAddLocker = (l) => {
        if(editingLocker) setFolders(folders.map(x => x.id === l.id ? l : x));
        else setFolders([...folders, l]);
        setEditingLocker(null);
      };

      const deleteLocker = (id) => {
        setFolders(folders.filter(f => f.id !== id));
        setAccounts(accounts.filter(a => a.lockerId !== id));
      };

      const updateAccount = (id, u) => setAccounts(accounts.map(a => a.id === id ? u : a));
      const deleteAccount = (id) => setAccounts(accounts.filter(a => a.id !== id));

      const handleAddAccount = (acc) => {
        const exists = accounts.some(a => a.id === acc.id);
        if (exists) setAccounts(accounts.map(a => a.id === acc.id ? acc : a));
        else setAccounts([acc, ...accounts]);
        setEditingAccount(null);
        setIsAccountModalOpen(false);
      };

      const handleDuplicate = (acc) => {
        const baseName = acc.name.replace(/\s\(\d+\)$/, "");
        let maxNum = 1;
        accounts.forEach(a => {
          const nameMatch = a.name.match(new RegExp(`^${baseName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}(?:\\s\\((\\d+)\\))?$`));
          if (nameMatch) {
            const num = nameMatch[1] ? parseInt(nameMatch[1]) : 1;
            if (num > maxNum) maxNum = num;
          }
        });
        const clone = { ...acc, id: Date.now(), name: `${baseName} (${maxNum + 1})`, currentBalance: acc.startBalance, dailyLogs: [], activity: [], winningDays: 0 };
        setAccounts([clone, ...accounts]);
      };

      const toggleSelection = (id) => setSelectedAccountIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

      const handleBulkLog = () => {
        if (!bulkPnl) return;
        const pnl = Number(bulkPnl);
        const updatedAccounts = accounts.map(acc => {
          if (selectedAccountIds.includes(acc.id)) {
            const nextBal = acc.currentBalance + pnl;
            const rules = acc.rules || {};
            const qualifiesAsWin = pnl >= (rules.minWinReq || 100);
            return {
              ...acc,
              currentBalance: nextBal,
              maxEquity: Math.max(acc.maxEquity || nextBal, nextBal),
              dailyLogs: [{ date: yyyyMmDd(), pnl }, ...(acc.dailyLogs || [])],
              winningDays: (acc.winningDays || 0) + (qualifiesAsWin ? 1 : 0)
            };
          }
          return acc;
        });
        setAccounts(updatedAccounts);
        setBulkPnl("");
        setSelectedAccountIds([]);
      };

      const allLockers = folders;

      const displayedAccounts = useMemo(() => {
        if (!currentLockerId) return [];
        return accounts.filter(acc => acc.lockerId === currentLockerId && (acc.phase || "evaluation") === phaseTab);
      }, [accounts, currentLockerId, phaseTab]);

      const globalPhaseAccounts = useMemo(() => accounts.filter(acc => (acc.phase || "evaluation") === phaseTab), [accounts, phaseTab]);
      const globalPhaseStats = useMemo(() => {
        const totalFunding = globalPhaseAccounts.reduce((sum, a) => sum + a.startBalance, 0);
        return { totalFunding };
      }, [globalPhaseAccounts]);

      const currentLockerStats = useMemo(() => {
        const totalFunding = displayedAccounts.reduce((sum, a) => sum + a.startBalance, 0);
        return { totalFunding };
      }, [displayedAccounts]);

      const calculatePnl = (accs, timeframe) => {
        let pnl = 0;
        const now = new Date();
        const todayStr = yyyyMmDd(now);
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        const oneWeekAgo = new Date(); oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);

        accs.forEach(acc => {
          if (timeframe === "ALL") {
            pnl += (acc.currentBalance - acc.startBalance);
          } else {
            (acc.dailyLogs || []).forEach(log => {
              const logDate = new Date(log.date);
              if (timeframe === "DAILY" && log.date === todayStr) pnl += Number(log.pnl);
              else if (timeframe === "WEEKLY" && logDate >= oneWeekAgo) pnl += Number(log.pnl);
              else if (timeframe === "MONTHLY" && logDate.getMonth() === currentMonth && logDate.getFullYear() === currentYear) pnl += Number(log.pnl);
            });
          }
        });
        return pnl;
      };

      const globalPnlStats = useMemo(() => ({
        eval: calculatePnl(accounts.filter(a => (a.phase||'evaluation') === 'evaluation'), pnlTimeframe),
        funded: calculatePnl(accounts.filter(a => a.phase === 'funded'), pnlTimeframe)
      }), [accounts, pnlTimeframe]);

      const currentLockerPnlStats = useMemo(() => {
        if (!currentLockerId) return { eval: 0, funded: 0 };
        const lockerAccs = accounts.filter(a => a.lockerId === currentLockerId);
        return {
          eval: calculatePnl(lockerAccs.filter(a => (a.phase||'evaluation') === 'evaluation'), pnlTimeframe),
          funded: calculatePnl(lockerAccs.filter(a => a.phase === 'funded'), pnlTimeframe)
        };
      }, [accounts, currentLockerId, pnlTimeframe]);

      const globalStats = useMemo(() => {
        const totalPayouts = accounts.reduce((sum, a) => sum + (a.activity || []).filter(act => act.type === 'payout').reduce((p, c) => p + Number(c.amount), 0), 0);
        const totalCost = accounts.reduce((sum, a) => sum + (Number(a.cost) || 0), 0);
        return { totalPayouts, totalCost, roi: totalPayouts - totalCost };
      }, [accounts]);

      const getLockerSummary = (lockerId) => {
        const accs = accounts.filter(a => a.lockerId === lockerId);

        const evals = accs.filter(a => (a.phase || 'evaluation') === 'evaluation');
        const fundeds = accs.filter(a => a.phase === 'funded');

        return {
          evalCount: evals.length,
          evalFunding: evals.reduce((s,a) => s + a.startBalance, 0),
          fundedCount: fundeds.length,
          fundedFunding: fundeds.reduce((s,a) => s + a.startBalance, 0),
          totalProfit: accs.reduce((s, a) => s + (a.currentBalance - a.startBalance), 0)
        };
      };

      const handleUpgrade = async () => {
        try {
          if (backendMode !== "cloud") {
            alert("Upgrades require cloud mode. Please configure Netlify Blobs / sign in to server mode.");
            return;
          }

          const token = localStorage.getItem("prop_locker_token");
          const tokenType = typeof token;
          const tokenLength = token ? token.length : 0;
          const tokenPartsCount = token ? token.split(".").length : 0;
          const tokenPreview = token && token.length > 24
            ? `${token.slice(0, 12)}...${token.slice(-12)}`
            : token || "";
          const willSetAuthHeader = Boolean(token);
          const isValidJwt = Boolean(
            token &&
            /^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(token)
          );

          console.debug("[checkout] token type/length", { type: tokenType, length: tokenLength });
          console.debug("[checkout] token parts", tokenPartsCount);
          console.debug("[checkout] token masked", tokenPreview);
          console.debug("[checkout] authorization header set", willSetAuthHeader);

          if (!isValidJwt || tokenPartsCount !== 3) {
            alert("Upgrades require cloud mode. Please configure Netlify Blobs / sign in to server mode.");
            return;
          }

          const response = await fetch(`${NETLIFY_FN_BASE}/create-checkout-session`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({})
          });

          const responseText = await response.text();

          if (response.status === 401) {
            localStorage.removeItem("prop_locker_token");
            localStorage.removeItem("prop_locker_auth");
            localStorage.removeItem("prop_locker_current_user");
            alert("Session expired. Please log in again.");
            onSessionExpired();
            return;
          }

          if (!response.ok) {
            console.error("Checkout session request failed", {
              status: response.status,
              body: responseText
            });
            alert("Unable to start checkout right now. Please try again.");
            return;
          }

          const data = responseText ? JSON.parse(responseText) : {};
          if (data?.url) window.location.href = data.url;
          else alert("Checkout session did not return a URL.");
        } catch (e) {
          alert("Unable to start checkout right now. Please try again.");
        }
      };

      return (
        <div className="min-h-screen p-4 md:p-8 max-w-[1800px] mx-auto flex flex-col animate-enter relative">
          {!isPro && (
            <div className="absolute top-0 left-0 w-full bg-gradient-to-r from-indigo-900 to-black text-white text-[10px] font-bold uppercase tracking-widest text-center py-2 z-[60] flex justify-center items-center gap-4">
              <span>Free Plan — Sync Disabled</span>
              <button onClick={handleUpgrade} className="bg-white text-black px-2 py-0.5 rounded text-[9px] hover:bg-glow-green transition-colors">UPGRADE TO PRO</button>
            </div>
          )}

          <div className="flex justify-between items-center mb-12 relative z-50 pt-6">
            <LogoMark />
            <div className="relative" ref={menuRef}>
              <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 text-zinc-400 hover:text-white transition-colors">{isMenuOpen ? <XIcon size={20} /> : <MenuIcon size={20} />}</button>
              {isMenuOpen && (
                <div className="absolute right-0 top-full mt-2 w-48 glass-panel rounded-lg overflow-hidden animate-fade-in flex flex-col shadow-2xl border border-zinc-800">
                  {/* FIX: removed setView('suite') calls (was crashing) */}
                  <button onClick={() => {setActiveTab("locker"); setIsMenuOpen(false); setCurrentLockerId(null);}} className={`px-4 py-3 text-xs text-left hover:bg-white/5 uppercase font-bold tracking-widest ${activeTab === "locker" ? "text-glow-green" : "text-zinc-400"}`}>Locker</button>
                  <button onClick={() => {setActiveTab("expenses"); setIsMenuOpen(false);}} className={`px-4 py-3 text-xs text-left hover:bg-white/5 uppercase font-bold tracking-widest ${activeTab === "expenses" ? "text-glow-green" : "text-zinc-400"}`}>Expenses</button>
                  <button onClick={() => {setActiveTab("tools"); setIsMenuOpen(false);}} className={`px-4 py-3 text-xs text-left hover:bg-white/5 uppercase font-bold tracking-widest ${activeTab === "tools" ? "text-glow-green" : "text-zinc-400"}`}>Tools</button>
                  <button onClick={onLogout} className="px-4 py-3 text-xs text-left text-red-400 border-t border-zinc-800 hover:bg-red-400/10 uppercase font-bold tracking-widest">Logout</button>
                </div>
              )}
            </div>
          </div>

          {activeTab === "locker" && (
            <div className="animate-enter w-full space-y-4 mx-auto">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-end border-b border-zinc-800 gap-4 pb-4">
                {!currentLockerId ? (
                  <div className="flex gap-8 items-center h-10">
                    <span className="text-sm font-bold text-white uppercase tracking-widest">My Lockers <span className="text-[10px] ml-1 opacity-60 font-data">{allLockers.length}</span></span>
                  </div>
                ) : (
                  <div className="flex gap-8 items-end">
                    <div className="flex items-center gap-4 pb-1">
                      <button onClick={() => setCurrentLockerId(null)} className="flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-zinc-500 hover:text-white transition-colors"><ArrowLeft size={16} /> Back</button>
                      <div className="h-4 w-[1px] bg-zinc-800"></div>
                      <div className="flex flex-col">
                        <span className="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">{folders.find(f => f.id === currentLockerId)?.firm}</span>
                        <span className="text-xl font-black font-logo text-white uppercase tracking-widest leading-none">{folders.find(f => f.id === currentLockerId)?.name}</span>
                      </div>
                    </div>

                    <div className="flex gap-6 ml-8">
                      <button onClick={() => setPhaseTab('evaluation')} className={`pb-1 text-xs font-bold uppercase tracking-widest relative transition-all ${phaseTab === 'evaluation' ? 'text-white' : 'text-zinc-600 hover:text-zinc-400'}`}>Evaluation {phaseTab === 'evaluation' && <div className="absolute bottom-0 left-0 w-full h-[2px] bg-glow-green shadow-[0_0_10px_#6DFFC6]"></div>}</button>
                      <button onClick={() => setPhaseTab('funded')} className={`pb-1 text-xs font-bold uppercase tracking-widest relative transition-all ${phaseTab === 'funded' ? 'text-white' : 'text-zinc-600 hover:text-zinc-400'}`}>Funded {phaseTab === 'funded' && <div className="absolute bottom-0 left-0 w-full h-[2px] bg-glow-green shadow-[0_0_10px_#6DFFC6]"></div>}</button>
                    </div>
                  </div>
                )}

                <div className="flex flex-wrap gap-3">
                  {!currentLockerId ? (
                    <button onClick={() => {setEditingLocker(null); setIsLockerModalOpen(true);}} className="bg-glow-green hover:bg-white text-black px-5 py-2 rounded font-bold text-[10px] uppercase tracking-widest transition-all flex items-center gap-2 shadow-[0_0_15px_rgba(109,255,198,0.3)]"><FolderIcon size={14}/> Create Locker</button>
                  ) : (
                    <>
                      {selectedAccountIds.length > 0 && <button onClick={() => setSelectedAccountIds([])} className="text-[9px] text-zinc-500 font-bold uppercase hover:text-white transition-colors">Deselect All</button>}
                      <button onClick={() => {setEditingAccount({lockerId: currentLockerId, phase: phaseTab}); setIsAccountModalOpen(true);}} className="bg-glow-green hover:bg-white text-black px-5 py-2 rounded font-bold text-[10px] uppercase tracking-widest transition-all flex items-center gap-2 shadow-[0_0_15px_rgba(109,255,198,0.3)]"><Plus size={14}/> New Account</button>
                    </>
                  )}
                </div>
              </div>

              {!currentLockerId ? (
                <div className="animate-fade-in space-y-8">
                  <div className="bg-white/5 rounded-xl border border-white/5 p-4 flex flex-col md:flex-row justify-between items-center gap-6 mb-6">
                    <div className="flex gap-12">
                      <div>
                        <div className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Total Funding (Active Tab)</div>
                        <div className="text-xl font-bold font-data text-white">{fmt0(globalPhaseStats.totalFunding)}</div>
                      </div>
                      <div className="w-px h-10 bg-white/10 hidden md:block"></div>
                      <div>
                        <div className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Eval PNL</div>
                        <div className={`text-xl font-bold font-data ${globalPnlStats.eval >= 0 ? 'text-glow-green' : 'text-red-500'}`}>
                          {globalPnlStats.eval >= 0 ? "+" : ""}{fmt0(globalPnlStats.eval)}
                        </div>
                      </div>
                      <div>
                        <div className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Live PNL</div>
                        <div className={`text-xl font-bold font-data ${globalPnlStats.funded >= 0 ? 'text-glow-green' : 'text-red-500'}`}>
                          {globalPnlStats.funded >= 0 ? "+" : ""}{fmt0(globalPnlStats.funded)}
                        </div>
                      </div>
                    </div>

                    <div className="flex bg-black/40 p-1 rounded-lg border border-white/5">
                      {["DAILY", "WEEKLY", "MONTHLY", "ALL"].map(t => (
                        <button
                          key={t}
                          onClick={() => setPnlTimeframe(t)}
                          className={`pnl-toggle-btn ${pnlTimeframe === t ? 'active' : ''}`}
                        >
                          {t}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pt-4">
                    {allLockers.length === 0 && (
                      <div className="col-span-full py-12 text-center border border-dashed border-zinc-800 rounded-xl">
                        <p className="text-zinc-500 text-xs uppercase tracking-widest font-bold">No Lockers Created. Create one to start.</p>
                      </div>
                    )}
                    {allLockers.map(locker => {
                      const summary = getLockerSummary(locker.id);
                      return (
                        <div key={locker.id} onClick={() => setCurrentLockerId(locker.id)} className="locker-card group bg-black/40 backdrop-blur-md relative p-6 flex flex-col h-64">
                          <div className="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity z-20">
                            <button onClick={(e) => {e.stopPropagation(); setEditingLocker(locker); setIsLockerModalOpen(true);}} className="hover:text-white text-zinc-500 bg-black/80 p-1.5 rounded border border-zinc-800"><Edit2 size={12}/></button>
                            <button onClick={(e) => {e.stopPropagation(); deleteLocker(locker.id);}} className="hover:text-red-500 text-zinc-500 bg-black/80 p-1.5 rounded border border-zinc-800"><Trash2 size={12}/></button>
                          </div>

                          <div className="flex-1 flex flex-col items-center justify-center text-center z-10 mt-2">
                            <h3 className="text-3xl font-black text-white font-logo uppercase tracking-widest leading-none mb-3">{locker.name}</h3>
                            <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.3em]">{locker.firm}</span>
                          </div>

                          <div className="w-full h-px bg-zinc-800/50 my-4"></div>

                          <div className="flex justify-between items-end w-full relative z-10">
                            <div className="flex flex-col items-start gap-1">
                              <div className="flex items-baseline gap-2">
                                <span className="text-sm font-bold text-white font-data">{summary.evalCount}</span>
                                <span className="text-[9px] font-bold text-zinc-600 uppercase tracking-wider">Evaluations</span>
                              </div>
                              <div className="flex items-baseline gap-2">
                                <span className="text-sm font-bold text-white font-data">{summary.fundedCount}</span>
                                <span className="text-[9px] font-bold text-zinc-600 uppercase tracking-wider">Funded</span>
                              </div>
                            </div>

                            <div className="flex flex-col items-end">
                              <span className="text-[9px] font-bold text-zinc-600 uppercase tracking-widest mb-1">Net P&L</span>
                              <span className={`text-2xl font-bold font-data ${summary.totalProfit >= 0 ? 'text-glow-green' : 'text-red-500'}`}>
                                {summary.totalProfit >= 0 ? "+" : ""}{fmt0(summary.totalProfit)}
                              </span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ) : (
                <div className="space-y-8 animate-fade-in">
                  <div className="bg-white/5 rounded-xl border border-white/5 p-4 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div className="flex gap-12">
                      <div><div className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Total Funding (Active Tab)</div><div className="text-xl font-bold font-data text-white">{fmt0(currentLockerStats.totalFunding)}</div></div>
                      <div className="w-px h-10 bg-white/10 hidden md:block"></div>
                      <div><div className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Eval PNL</div><div className={`text-xl font-bold font-data ${currentLockerPnlStats.eval >= 0 ? 'text-glow-green' : 'text-red-500'}`}>{currentLockerPnlStats.eval >= 0 ? "+" : ""}{fmt0(currentLockerPnlStats.eval)}</div></div>
                      <div><div className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-1">Live PNL</div><div className={`text-xl font-bold font-data ${currentLockerPnlStats.funded >= 0 ? 'text-glow-green' : 'text-red-500'}`}>{currentLockerPnlStats.funded >= 0 ? "+" : ""}{fmt0(currentLockerPnlStats.funded)}</div></div>
                    </div>
                    <div className="flex bg-black/40 p-1 rounded-lg border border-white/5">{["DAILY", "WEEKLY", "MONTHLY", "ALL"].map(t => (<button key={t} onClick={() => setPnlTimeframe(t)} className={`pnl-toggle-btn ${pnlTimeframe === t ? 'active' : ''}`}>{t}</button>))}</div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    {displayedAccounts.map(acc => (
                      <AccountCard
                        key={acc.id} account={acc} onDelete={deleteAccount} onUpdate={(id,u)=>updateAccount(id,u)}
                        onEdit={(a) => {setEditingAccount(a); setIsAccountModalOpen(true);}}
                        onDuplicate={handleDuplicate} setPhaseTab={setPhaseTab}
                        isSelected={selectedAccountIds.includes(acc.id)} onToggleSelection={toggleSelection}
                        lockers={folders}
                      />
                    ))}
                    {displayedAccounts.length === 0 && (
                      <div className="col-span-full py-12 text-center text-zinc-600 text-xs font-bold uppercase tracking-widest border border-dashed border-zinc-800 rounded-xl">
                        No {phaseTab} Accounts in this Locker
                      </div>
                    )}
                  </div>

                  {selectedAccountIds.length > 1 && (
                    <div className="bulk-entry-bar border-green-accent">
                      <div className="flex items-center gap-4">
                        <div className="w-10 h-10 bg-glow-green/10 rounded-full flex items-center justify-center text-glow-green"><Layers size={20}/></div>
                        <div><div className="text-xs font-bold text-white uppercase tracking-widest">Bulk Entry</div><div className="text-[9px] text-zinc-500 font-bold uppercase">{selectedAccountIds.length} Nodes Selected</div></div>
                      </div>
                      <div className="flex gap-2 flex-1 max-w-xs">
                        <input type="text" placeholder="DELTA (+/-)" value={bulkPnl} onChange={e => setBulkPnl(e.target.value)} className="bg-black/60 border border-zinc-800 rounded-lg px-4 py-2 text-xs text-white font-data flex-1 outline-none focus:border-glow-green"/>
                        <button onClick={handleBulkLog} className="bg-glow-green hover:bg-white text-black px-6 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">LOG ALL</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {activeTab === 'expenses' && (
            <div className="animate-enter max-w-5xl mx-auto w-full space-y-8">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="glass-panel p-8 rounded-xl"><div className="text-[10px] text-zinc-500 font-bold uppercase mb-2">Total Investment</div><div className="text-4xl font-bold font-data text-white">{fmt0(globalStats.totalCost)}</div></div>
                <div className="glass-panel p-8 rounded-xl"><div className="text-[10px] text-zinc-500 font-bold uppercase mb-2">Total Payouts</div><div className="text-4xl font-bold font-data text-glow-green">{fmt0(globalStats.totalPayouts)}</div></div>
                <div className="glass-panel p-8 rounded-xl"><div className="text-[10px] text-zinc-500 font-bold uppercase mb-2">Net ROI</div><div className={`text-4xl font-bold font-data ${globalStats.roi >= 0 ? 'text-glow-green' : 'text-red-500'}`}>{fmt0(globalStats.roi)}</div></div>
              </div>
              <div className="glass-panel rounded-xl overflow-hidden border border-zinc-800">
                <div className="p-4 border-b border-zinc-800 bg-zinc-900/20 flex items-center gap-2"><Calendar size={14} className="text-zinc-500"/><span className="text-xs font-bold text-white uppercase tracking-widest">Expense Ledger</span></div>
                <div className="overflow-x-auto">
                  <table className="w-full expense-table">
                    <thead><tr><th>Account</th><th>Start Date</th><th>Size</th><th>Cost</th><th>Current Bal</th><th>Payouts</th><th>Return</th></tr></thead>
                    <tbody>
                      {accounts.map(acc => {
                        const payouts = (acc.activity||[]).filter(a=>a.type==='payout').reduce((s,c)=>s+Number(c.amount),0);
                        return (
                          <tr key={acc.id} className="text-zinc-400">
                            <td>{acc.name}</td>
                            <td>{acc.startDate}</td>
                            <td className="font-data">{fmt0(acc.startBalance)}</td>
                            <td className="text-red-500 font-data">-{fmt0(acc.cost || 0)}</td>
                            <td className="text-white font-data">{fmt0(acc.currentBalance)}</td>
                            <td className="text-glow-green font-data">{fmt0(payouts)}</td>
                            <td className={`font-bold font-data ${payouts - (acc.cost||0) >= 0 ? 'text-glow-green' : 'text-red-500'}`}>{fmt0(payouts - (acc.cost||0))}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {activeTab === 'tools' && (
            <div className="animate-enter max-w-5xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-8">
              {!isPro ? (
                <div className="col-span-full h-96 flex flex-col items-center justify-center glass-panel rounded-2xl border-dashed border-zinc-800 text-center space-y-4">
                  <div className="p-4 bg-glow-green/10 rounded-full text-glow-green"><LockIcon size={32}/></div>
                  <div>
                    <h3 className="text-white font-bold uppercase tracking-widest mb-2">Pro Tools Locked</h3>
                    <p className="text-zinc-500 text-sm">Upgrade to Pro to access Risk Management & Consistency calculators.</p>
                  </div>
                  <button onClick={handleUpgrade} className="bg-glow-green text-black px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-white transition-all">Unlock Pro Tools</button>
                </div>
              ) : (
                <>
                  <div className="glass-panel p-8 rounded-2xl space-y-6">
                    <div className="flex items-center gap-2 mb-2"><PieChart size={18} className="text-glow-green"/><h3 className="text-white font-bold uppercase tracking-widest text-sm">Consistency Calculator</h3></div>
                    <div className="space-y-4">
                      <div>
                        <label className="text-[10px] text-zinc-500 font-bold uppercase block mb-1">Total Profit Goal ($)</label>
                        <input type="number" value={calcProfit} onChange={e=>setCalcProfit(e.target.value)} className="w-full bg-black/40 border border-zinc-800 rounded-lg px-4 py-2 text-white font-data outline-none focus:border-glow-green"/>
                      </div>
                      <div>
                        <label className="text-[10px] text-zinc-500 font-bold uppercase block mb-1">Consistency Rule (%)</label>
                        <input type="number" value={calcCons} onChange={e=>setCalcCons(e.target.value)} className="w-full bg-black/40 border border-zinc-800 rounded-lg px-4 py-2 text-white font-data outline-none focus:border-glow-green"/>
                      </div>
                      <div className="bg-black/40 p-4 rounded-xl border border-white/5 space-y-2">
                        <div className="flex justify-between items-end">
                          <span className="text-xs text-zinc-500 font-bold uppercase">Max Single Day Limit</span>
                          <span className="text-2xl font-bold font-data text-glow-green">{fmt0(calcProfit * (calcCons/100))}</span>
                        </div>
                        <div className="h-1.5 w-full bg-zinc-800 rounded-full overflow-hidden">
                          <div className="h-full bg-glow-green transition-all" style={{width:`${calcCons}%`}}></div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="glass-panel p-8 rounded-2xl space-y-6">
                    <div className="flex items-center gap-2 mb-2"><AlertCircle size={18} className="text-glow-green"/><h3 className="text-white font-bold uppercase tracking-widest text-sm">NASDAQ Risk Manager</h3></div>
                    <div className="space-y-4">
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="text-[10px] text-zinc-500 font-bold uppercase block mb-1">Risk Amount ($)</label>
                          <input type="number" value={riskRisk} onChange={e=>setRiskRisk(e.target.value)} className="w-full bg-black/40 border border-zinc-800 rounded-lg px-4 py-2 text-white font-data outline-none focus:border-glow-green"/>
                        </div>
                        <div>
                          <label className="text-[10px] text-zinc-500 font-bold uppercase block mb-1">Stop Loss (Pts)</label>
                          <input type="number" value={riskStop} onChange={e=>setRiskStop(e.target.value)} className="w-full bg-black/40 border border-zinc-800 rounded-lg px-4 py-2 text-white font-data outline-none focus:border-glow-green"/>
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div className="bg-black/40 p-4 rounded-xl border border-white/5 text-center">
                          <div className="text-[9px] text-zinc-500 font-bold uppercase mb-1">MNQ (Micros)</div>
                          <div className="text-3xl font-bold text-white font-data">{(riskRisk / (riskStop * 2)).toFixed(1)}</div>
                        </div>
                        <div className="bg-black/40 p-4 rounded-xl border border-white/5 text-center">
                          <div className="text-[9px] text-zinc-500 font-bold uppercase mb-1">NQ (Minis)</div>
                          <div className="text-3xl font-bold text-white font-data">{(riskRisk / (riskStop * 20)).toFixed(2)}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </>
              )}
            </div>
          )}

          <AddLockerModal
            isOpen={isLockerModalOpen}
            onClose={() => {setIsLockerModalOpen(false); setEditingLocker(null);}}
            onAdd={handleAddLocker}
            editLocker={editingLocker}
          />
          <AddAccountModal
            isOpen={isAccountModalOpen}
            onClose={() => {setIsAccountModalOpen(false); setEditingAccount(null);}}
            onAdd={handleAddAccount}
            editAccount={editingAccount}
            lockers={folders}
            currentLockerId={currentLockerId}
          />
        </div>
      );
    };

    /* ===========================
       ========== APP ROUTER (FIXED)
       =========================== */
    const App = () => {
      const [appState, setAppState] = useState(() => {
        const token = localStorage.getItem("prop_locker_token");
        const hasJwt = Boolean(
          token &&
          /^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(token)
        );
        const persistedMode = localStorage.getItem("prop_locker_backend_mode");

        return {
          screen: localStorage.getItem('prop_locker_auth') === 'true' ? 'suite' : 'landing',
          backendMode: persistedMode || (hasJwt ? "cloud" : "local")
        };
      });
      const [view, setView] = useState('landing');
      const [tempUserData, setTempUserData] = useState(null);

      const navigateTo = (v) => setView(v);

      if (appState.screen === 'landing' && view === 'about') return <AboutPage onBack={() => setView('landing')} />;
      if (appState.screen === 'landing' && view === 'how') return <HowItWorksPage onBack={() => setView('landing')} />;
      if (appState.screen === 'landing' && view === 'faq') return <FAQPage onBack={() => setView('landing')} />;
      if (appState.screen === 'landing' && view === 'signup') return (
        <SignupPage
          onSignupSuccess={(user) => { setTempUserData(user); setView('signupSuccess'); }}
          onNavigateToLogin={() => { setAppState((s) => ({ ...s, screen: 'login' })); setView('landing'); }}  /* FIX: normalize view */
        />
      );
      if (appState.screen === 'landing' && view === 'signupSuccess') return (
        <SignupSuccessPage
          createdUser={tempUserData}
          onGoToLogin={() => { setAppState((s) => ({ ...s, screen: 'login' })); setView('landing'); }} /* FIX */
        />
      );

      return (
        <>
          {appState.screen === 'landing' && view === 'landing' && (
            <LandingPage onStart={() => setView('signup')} onNavigate={navigateTo} />
          )}

          {appState.screen === 'login' && (
            <LoginPage
              onLogin={(user, backendMode) => {
                localStorage.setItem('prop_locker_auth', 'true');
                localStorage.setItem('prop_locker_current_user', JSON.stringify(user));
                const nextMode = backendMode || "local";
                localStorage.setItem('prop_locker_backend_mode', nextMode);
                setAppState({ screen: 'suite', backendMode: nextMode });
                setView('landing'); /* FIX: normalize */
              }}
              onNavigateToSignup={() => { setAppState((s) => ({ ...s, screen: 'landing' })); setView('signup'); }}
            />
          )}

          {appState.screen === 'suite' && (
            <LockerSuite backendMode={appState.backendMode} onLogout={() => {
              localStorage.removeItem('prop_locker_auth');
              localStorage.removeItem('prop_locker_current_user');
              localStorage.removeItem('prop_locker_token');
              localStorage.removeItem('prop_locker_backend_mode');
              setAppState({ screen: 'landing', backendMode: 'local' });
              setView('landing');
            }} onSessionExpired={() => {
              localStorage.removeItem('prop_locker_auth');
              localStorage.removeItem('prop_locker_current_user');
              localStorage.removeItem('prop_locker_token');
              localStorage.removeItem('prop_locker_backend_mode');
              setAppState({ screen: 'login', backendMode: 'local' });
              setView('landing');
            }} />
          )}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
